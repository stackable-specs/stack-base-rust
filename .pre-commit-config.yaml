# Pre-commit configuration for stack-base-rust
# https://pre-commit.com/

repos:
  # Rust formatting
  - repo: local
    hooks:
      - id: cargo-fmt
        name: Cargo fmt
        entry: bash -c 'cargo fmt --check'
        language: system
        files: \.rs$
        pass_filenames: false

  # Rust linting with Clippy
  - repo: local
    hooks:
      - id: cargo-clippy
        name: Cargo clippy
        entry: bash -c 'cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        files: \.rs$
        pass_filenames: false

  # Cargo check
  - repo: local
    hooks:
      - id: cargo-check
        name: Cargo check
        entry: bash -c 'cargo check --workspace --all-targets --all-features'
        language: system
        files: (Cargo\.toml|Cargo\.lock|\.rs)$
        pass_filenames: false

  # Rust tests
  - repo: local
    hooks:
      - id: cargo-test
        name: Cargo test
        entry: bash -c 'cargo test --workspace'
        language: system
        files: \.rs$
        pass_filenames: false
        stages: [pre-push]

  # Dockerfile linting with Hadolint
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker

  # Docker Compose validation
  - repo: local
    hooks:
      - id: compose-validate
        name: Validate Docker Compose
        entry: bash -c 'docker compose config --quiet'
        language: system
        files: ^compose.*\.ya?ml$
        pass_filenames: false

  # Trivy misconfiguration scanning
  - repo: local
    hooks:
      - id: trivy-config
        name: Trivy IaC Scan
        entry: bash -c 'trivy config Dockerfile compose.yaml compose.override.yaml 2>/dev/null || true'
        language: system
        files: ^(Dockerfile|compose.*\.ya?ml)$
        pass_filenames: false

  # Secret scanning with gitleaks
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks

  # Conventional commits
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]