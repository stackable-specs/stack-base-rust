# compose.yaml - Production configuration
# Reference: docs/specs/delivery/docker-compose.md

name: stack-base-rust

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: stack-base-rust:latest  # Tag for build output
    restart: unless-stopped
    user: "10001:10001"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
    healthcheck:
      test: ["CMD", "/app/stack-base-rust"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"